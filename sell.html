<html>
<head>
    <title>K-Shop | Become a Seller</title>
    <style>
        /* Pink & Blue Professional Theme */
        body {
            background: linear-gradient(135deg, #64b6fe 0%, #f04fcd 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
        }
        form {
              max-width: 100%;
             overflow: hidden;
        }

        .sell-container {
            background: rgba(255, 255, 255, 0.98);
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .header-section {
            margin-bottom: 30px;
        }

        h1 { color: #333; font-size: 28px; }
        h1 span { color: #e51cba; }
        p { color: #666; font-size: 15px; }

        /* Form Design */
        .sell-form {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Do columns banaye hain */
            gap: 20px;
            text-align: left;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            color: #444;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            background: #fdfdfd;
        }

        input:focus {
            border-color: #4facfe;
            background: #fff;
        }

         .upload-area {
            width: 100%;
            max-width: 400px;
            margin:0px auto;
            overflow: hidden;
            border: 2px dashed #0c84ed;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            border-radius: 10px;
            background: #f0f9ff;
            cursor: pointer;
            
        } 
         

        .submit-btn {
            grid-column: span 2;
            padding: 15px;
            background: linear-gradient(to right, #4facfe, #e51cba);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(229, 28, 186, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(229, 28, 186, 0.4);
        }

        .back-home {
            display: block;
            margin-top: 25px;
            color: #0c1924;
            text-decoration: none;
            font-weight: 600;
        }
        .upload-area {
            width: 100%;
            max-width: 250px;
            height: 100px;
            border: 2px dashed #0c84ed;
            border-radius: 10px;
            background: #f0f9ff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
}

        #preview {
             max-width: 100%;
             max-height: 100%;
             display: none;
            width: 200px;
            height: 200px;
}
        .full-width {
           grid-column: span 2;
}
         
          
    </style>
</head>
<body>

<div class="sell-container">
    <div class="header-section">
        <h1>Sell on <span>K-Shop</span></h1>
        <p>Start your business with us,fill in the details, and start selling!</p>
    </div>

    <form class="sell-form" overflow:auto; onsubmit="alert('Application Submitted! K-Shop team will review your products.'); return false;">
        <div class="input-group">
            <label>Product Name</label>
            <input type="text" placeholder="e.g. Laptops" required>
        </div>

        <div class="input-group">
            <label>Category</label>
            <select>
                <option>Television</option>
                <option>Mobile Phones</option>
                <option>Speakers</option>
                <option>Ear Buds</option>
                <option>Headphones</option>
                <option>Air Conditoners </option>
                <option>Refrigerators</option>
            </select>
        </div>

        <div class="input-group">
            <label>Price (₹)</label>
            <input type="number" placeholder="Set your price" required>
        </div>

        <div class="input-group">
            <label>Stock Quantity</label>
            <input type="number" placeholder="How many items?" required>
        </div>

        <div class="input-group full-width">
            <label>Product Description</label>
            <textarea rows="3" placeholder="Tell us about your product..."></textarea>
        </div>

        <div class="input-group full-width">
            <label>Upload Product Photo</label>
            <!-- <div class="upload-box">
                <span>Click to upload image</span>
                <input type="file" style="display: none;" id="fileInput">
            </div> -->
            <div class="input-group full-width">
  

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)" hidden>

    <p id="upload-text">Click to upload image</p>
    <img id="preview" src="">
  </div>
</div>
        </div> 
       


        <button type="submit" class="submit-btn">List My Product</button>
    </form>

    <a href="home.html" class="back-home">← Back to Shopping</a>
</div>
<script src="sell.js"></script>
</body>
</html>
